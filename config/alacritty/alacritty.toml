import = [
    "~/.config/alacritty/keybindings.toml"
]

[window]
decorations = "buttonless"
dynamic_title = true
opacity = 0.98

[window.dimensions]
columns = 170
lines = 50

[window.padding]
x = 5
y = 7

[scrolling]
history = 100000
multiplier = 3

[font]
size = 13.0

[font.normal]
family = "Ellograph CF"
style = "Regular"

[font.bold]
family = "Ellograph CF"
style = "Bold"

[font.italic]
family = "Ellograph CF"
style = "Italic"

[font.bold_italic]
family = "Ellograph CF"
style = "Bold Italic"

[selection]
save_to_clipboard = true

[cursor]
unfocused_hollow = true

[cursor.style]
shape = "Block"
blinking = "On"

[colors.primary]
background = "#1d2021"
foreground = "#d4be98"

[colors.normal]
black   = "#32302f"
red     = "#ea6962"
green   = "#a9b665"
yellow  = "#d8a657"
blue    = "#7daea3"
magenta = "#d3869b"
cyan    = "#89b482"
white   = "#d4be98"

[colors.bright]
black   = "#32302f"
red     = "#ea6962"
green   = "#a9b665"
yellow  = "#d8a657"
blue    = "#7daea3"
magenta = "#d3869b"
cyan    = "#89b482"
white   = "#d4be98"
