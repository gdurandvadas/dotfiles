add_newline = true
command_timeout = 2000

[character]
success_symbol = "[вһӨ](bold green)"
error_symbol = "[вң–](bold red)"

[package]
disabled = true

[directory]
style = "bold bright-blue"

[git_branch]
style = "bold bright-white"

[git_status]
ahead = "[п…¶](purple)[$count](white)"
behind = "[п…ө](cyan)[$count](white)"
conflicted = '[=$count](yellow)'
deleted = '[вңҳ$count](black)'
diverged = "[п…ө](cyan)[$ahead_count](white)[п…¶](purple)[$behind_count](white)"
modified = '[*$count](red)'
renamed = "[В»$count](purple)"
staged = "[+$count](green)"
stashed = "[\\$$count](yellow)"
style = "bold bright-white"
untracked = "[?$count](cyan)"

[git_commit]
only_detached = true
style = "bold black"
format = "[$hash]($style) "

